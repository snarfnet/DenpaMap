name: DenpaMap
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "17.0"

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    exactVersion: 11.13.0

settings:
  base:
    SWIFT_VERSION: 5.9
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.denpamap
    DEVELOPMENT_TEAM: 83VGKGSQUH
    CODE_SIGN_STYLE: Automatic

targets:
  DenpaMap:
    type: application
    platform: iOS
    sources: [DenpaMap]
    dependencies:
      - package: GoogleMobileAds
    settings:
      base:
        INFOPLIST_FILE: DenpaMap/Info.plist
        PRODUCT_NAME: DenpaMap
    info:
      path: DenpaMap/Info.plist
      properties:
        CFBundleName: DenpaMap
        CFBundleDisplayName: "電波マップ"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocationWhenInUseUsageDescription: "通信品質を位置情報と紐付けてマップに表示します。"
        NSLocationAlwaysAndWhenInUseUsageDescription: "バックグラウンドでも通信品質の計測を続けます。"
        NSUserTrackingUsageDescription: "This app uses data for personalized ads."
        GADApplicationIdentifier: ca-app-pub-9404799280370656~2784721258
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
          - SKAdNetworkIdentifier: 4fzdc2evr5.skadnetwork
          - SKAdNetworkIdentifier: 2fnua5tdw4.skadnetwork
          - SKAdNetworkIdentifier: ydx93a7ass.skadnetwork
          - SKAdNetworkIdentifier: 5a6flpkh64.skadnetwork
          - SKAdNetworkIdentifier: p78axxw29g.skadnetwork
          - SKAdNetworkIdentifier: v72qych5uu.skadnetwork
          - SKAdNetworkIdentifier: 3rd42ekr43.skadnetwork
          - SKAdNetworkIdentifier: 3qcr597p9d.skadnetwork
        ITSAppUsesNonExemptEncryption: false
